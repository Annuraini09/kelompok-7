<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - Hasil Pemilihan</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <main class="container">
    <h1>Hasil Pemilihan</h1>
    <div id="results">Memuat...</div>
    <p><a href="index.html">Kembali ke voting</a></p>
  </main>
  <script>
    async function loadResults(){
      const res = await fetch('backend/api.php?action=results');
      const data = await res.json();
      const container = document.getElementById('results');
      container.innerHTML = '';
      data.forEach(c=>{
        const div = document.createElement('div');
        div.className = 'resultItem';
        div.innerHTML = `<strong>${c.name}</strong> — ${c.votes} suara <div class="bar"><div class="fill" style="width:${Math.min(100, (c.votes||0)*10)}%"></div></div>`;
        container.appendChild(div);
      });
    }
    loadResults();
  </script>
</body>
</html>
