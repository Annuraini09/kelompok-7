<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Calon - E-Voting RT/RW</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    header {
      background: rgba(0, 0, 0, 0.1);
      color: white;
      padding: 20px;
      text-align: center;
    }
    header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }
    header p {
      font-size: 14px;
      opacity: 0.9;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      text-align: center;
    }
    .profile-section {
      margin-bottom: 30px;
    }
    .profile-photo {
      width: 150px;
      height: 150px;
      background: #f0f0f0;
      border-radius: 10px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 3px solid #667eea;
    }
    .profile-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .profile-photo.empty {
      font-size: 14px;
      color: #999;
    }
    .profile-info h2 {
      color: #333;
      font-size: 24px;
      margin: 15px 0;
    }
    .profile-info p {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
      margin: 10px 0;
    }
    .vote-box {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 10px;
      margin: 30px 0;
    }
    .vote-box .label {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 10px;
    }
    .vote-box .number {
      font-size: 48px;
      font-weight: bold;
    }
    .vote-box .unit {
      font-size: 14px;
      opacity: 0.9;
    }
    .progress-bar {
      background: rgba(255, 255, 255, 0.2);
      height: 8px;
      border-radius: 5px;
      margin-top: 15px;
      overflow: hidden;
    }
    .progress-bar .fill {
      height: 100%;
      background: white;
      border-radius: 5px;
      transition: width 0.3s;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-secondary {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
    }
    .btn-secondary:hover {
      background: #f5f5f5;
    }
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: white;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error {
      background: #ffebee;
      color: #d32f2f;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Dashboard Calon RT/RW</h1>
  <p>Pantau perkembangan pemilihan Anda secara real-time</p>
</header>

<div class="container">
  <div class="card" id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Memuat profil calon...</p>
    </div>
  </div>
</div>

<script>
  async function loadCandidateProfile() {
    const content = document.getElementById('content');
    
    try {
      const response = await fetch('backend/api.php?action=get_candidate_profile');
      const data = await response.json();

      if (data.success) {
        const profile = data.profile;
        const totalVotes = profile.votes || 0;
        
        content.innerHTML = `
          <div class="profile-section">
            <div class="profile-photo ${profile.photo_url ? '' : 'empty'}">
              ${profile.photo_url ? `<img src="${profile.photo_url}" alt="${profile.name}">` : 'Tidak ada foto'}
            </div>
            <div class="profile-info">
              <h2>${profile.name}</h2>
              <p>${profile.description || 'Calon RT/RW'}</p>
            </div>
          </div>

          <div class="vote-box">
            <div class="label">TOTAL SUARA MASUK</div>
            <div class="number">${totalVotes}</div>
            <div class="unit">suara</div>
            <div class="progress-bar">
              <div class="fill" style="width: ${Math.min(100, totalVotes * 5)}%"></div>
            </div>
          </div>

          <div class="actions">
            <button class="btn-secondary" onclick="refreshPage()">Refresh</button>
            <button class="btn-primary" onclick="logout()">Logout</button>
          </div>
        `;

        // Auto-refresh every 5 seconds
        setInterval(refreshProfile, 5000);
      } else {
        if (response.status === 401) {
          window.location.href = 'candidate-login.html';
        } else {
          content.innerHTML = `<div class="error">Error: ${data.error}</div>`;
        }
      }
    } catch (error) {
      content.innerHTML = `<div class="error">Terjadi kesalahan: ${error.message}</div>`;
    }
  }

  async function refreshProfile() {
    try {
      const response = await fetch('backend/api.php?action=get_candidate_profile');
      const data = await response.json();

      if (data.success) {
        const profile = data.profile;
        const voteNumber = document.querySelector('.vote-box .number');
        const progressFill = document.querySelector('.progress-bar .fill');
        
        if (voteNumber) {
          voteNumber.textContent = profile.votes || 0;
          progressFill.style.width = Math.min(100, (profile.votes || 0) * 5) + '%';
        }
      }
    } catch (error) {
      // Silent fail, just skip this refresh
    }
  }

  function refreshPage() {
    loadCandidateProfile();
  }

  function logout() {
    if (confirm('Yakin ingin logout?')) {
      fetch('backend/api.php?action=logout');
      window.location.href = 'candidate-login.html';
    }
  }

  // Load profile on page load
  window.addEventListener('load', loadCandidateProfile);
</script>

</body>
</html>
